version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: smart_learning_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartlearning
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - smart_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_learning_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smartlearning?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smart_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_learning_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - smart_network

networks:
  smart_network:
    driver: bridge
