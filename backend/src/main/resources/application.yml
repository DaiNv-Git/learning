spring:
  datasource:
    url: jdbc:h2:mem:smartlearning
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console.enabled: true
  sql:
    init:
      mode: never
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

