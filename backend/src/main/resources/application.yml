spring:
  datasource:
    url: jdbc:h2:mem:smartlearning
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console.enabled: true
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: aVerySecretKeyThatShouldBeLongEnoughForHS512AlgorithmOrYouWillGetAnError1234567890!@#$%^&*()
  expirationMs: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
